name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:

  # ── Rust: core library + test suite ──────────────────────────────
  test-rust:
    name: Rust (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (no warnings)
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

  # ── Feature-gate checks ─────────────────────────────────────────
  test-features:
    name: Feature gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: no_std check (core only, no std)
        run: cargo check --no-default-features

      - name: std check (core + std, no json, no dict)
        run: cargo check --no-default-features --features std

      - name: full check (all features)
        run: cargo check --all-features

  # ── Python bindings ─────────────────────────────────────────────
  test-python:
    name: Python (PyO3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install maturin + pytest
        run: pip install maturin pytest

      - name: Build wheel
        run: maturin build --release --features python

      - name: Install wheel
        run: pip install target/wheels/tson-*.whl

      - name: Run Python tests
        run: pytest python/tests/ -v

  # ── Node.js bindings ────────────────────────────────────────────
  test-node:
    name: Node.js (napi-rs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install napi-rs CLI (v2 - matches js/package.json devDependency)
        run: npm install -g @napi-rs/cli@2.18.4

      - name: Build addon
        # napi v2 flags: `-c` = napi config (package.json), positional dest dir.
        # `--cargo-flags=--lib` restricts the build to the cdylib: without it
        # napi runs `cargo build --features nodejs` over ALL targets, and the
        # bins (which don't link the Node runtime) fail with undefined napi_* symbols.
        run: napi build --platform --release -c js/package.json --features nodejs --cargo-flags="--lib" js

      - name: Run Node.js tests
        run: node js/test.js
