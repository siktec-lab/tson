name: Release

# Publishes TSON to crates.io (Rust) and PyPI (Python wheels) via Trusted
# Publishing (OIDC) — no long-lived tokens stored as secrets.
#
# Triggered by pushing a version tag (v*). npm is NOT published here yet (see
# the gated `publish-npm` job and the note at the bottom).
#
# One-time setup before the FIRST release:
#   • crates.io: Trusted Publishing requires the crate to exist first. Do one
#     manual `cargo publish` locally, then add the GitHub trusted publisher at
#     https://crates.io/crates/tson/settings (repo: siktec-lab/tson,
#     workflow: release.yml). Subsequent tags publish via OIDC below.
#   • PyPI: can be pre-configured. Add a "pending" trusted publisher at
#     https://pypi.org/manage/account/publishing/ (PyPI project: tson-bin,
#     owner: siktec-lab, repo: tson, workflow: release.yml). No manual publish
#     needed — the first tagged release publishes via OIDC.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Also publish npm packages (requires npm bootstrap done)"
        type: boolean
        default: false

jobs:
  # ── crates.io (OIDC) ─────────────────────────────────────────────
  publish-crate:
    name: Publish crate (crates.io)
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC token exchange
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Authenticate to crates.io (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: cargo publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ── PyPI: build a wheel per OS/arch, then publish via OIDC ───────
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features python
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ── npm (DEFERRED) ───────────────────────────────────────────────
  # npm Trusted Publishing requires each package to exist before OIDC can be
  # configured, and we publish 6 packages (main + 5 platform). Until that
  # bootstrap is done, this job only runs on a manual dispatch with
  # publish_npm=true AND an NPM_TOKEN secret present. See CONTRIBUTING.md.
  build-node:
    name: Build addon (${{ matrix.target }})
    if: github.event_name == 'workflow_dispatch' && inputs.publish_npm
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install JS deps
        working-directory: js
        run: npm install
      - name: Build addon
        working-directory: js
        run: npx napi build --platform --release --manifest-path ../Cargo.toml --target ${{ matrix.target }} -F nodejs -o .
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: js/*.node

  publish-npm:
    name: Publish to npm
    needs: build-node
    if: github.event_name == 'workflow_dispatch' && inputs.publish_npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install JS deps
        working-directory: js
        run: npm install
      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: js/artifacts
      - name: Move artifacts into per-platform npm dirs
        working-directory: js
        run: |
          npx napi artifacts -d artifacts --npm-dir npm
          npx napi create-npm-dirs
      - name: Publish all packages
        working-directory: js
        run: npx napi pre-publish -t npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
