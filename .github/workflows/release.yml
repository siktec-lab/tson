name: Release

# Publishes TSON to crates.io (Rust), PyPI (Python wheels), and npm
# (Node addon + per-platform packages) when a version tag is pushed.
#
# Required repository secrets:
#   CARGO_REGISTRY_TOKEN   crates.io API token
#   PYPI_API_TOKEN         PyPI API token (or configure trusted publishing)
#   NPM_TOKEN              npm automation token

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ── crates.io ────────────────────────────────────────────────────
  publish-crate:
    name: Publish crate (crates.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  # ── PyPI: build a wheel per OS/arch, then publish ────────────────
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features python
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Publish
        run: |
          pip install twine
          twine upload --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  # ── npm: build the addon per platform, then publish ─────────────
  build-node:
    name: Build addon (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install JS deps
        working-directory: js
        run: npm install
      - name: Build addon
        working-directory: js
        run: npx napi build --platform --release --manifest-path ../Cargo.toml --target ${{ matrix.target }} -F nodejs -o .
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: js/*.node

  publish-npm:
    name: Publish to npm
    needs: build-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install JS deps
        working-directory: js
        run: npm install
      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: js/artifacts
      - name: Move artifacts into per-platform npm dirs
        working-directory: js
        run: |
          npx napi artifacts -d artifacts --npm-dir npm
          npx napi create-npm-dirs
      - name: Publish all packages
        working-directory: js
        run: npx napi pre-publish -t npm --skip-optional-publish=false || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
