[package]
name = "tson"
version = "0.1.0"
edition = "2021"
description = "Terse JSON — a compact binary JSON format for microcontrollers and constrained environments"
default-run = "tson-cli"

[lib]
name = "tson"
path = "src/lib.rs"

[[bin]]
name = "tson-cli"
path = "src/main.rs"

[[bin]]
name = "tson-bench"
path = "src/bin/bench.rs"

[features]
default = ["std", "json"]
std = []
json = ["serde", "serde_json"]

[dependencies]
thiserror = "2.0"

# Optional: JSON interop (behind the "json" feature)
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }

[dev-dependencies]
serde_json = "1.0"
